# Specialist clients — FedProx with μ=0.1.
# Stronger proximal pull motivated by the extreme drift expected when
# clients see only one class. Li et al. 2020 swept μ ∈ {0, 0.001, 0.01, 0.1, 1}.
client_objective:
  proximal_mu: 0.1
federation:
  num_clients: 7
  num_rounds: 100
  local_epochs: 5
  fraction_fit: 1.0
  fraction_evaluate: 1.0
partition:
  strategy: specialist
