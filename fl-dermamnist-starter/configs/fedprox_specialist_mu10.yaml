# Specialist clients — FedProx with μ=1.0.
# Very strong proximal pull. Expected to under-train (clients barely move
# from the global model), included as the "too much regularization" endpoint
# of the μ sweep recommended by Li et al. 2020.
client_objective:
  proximal_mu: 1.0
federation:
  num_clients: 7
  num_rounds: 100
  local_epochs: 5
  fraction_fit: 1.0
  fraction_evaluate: 1.0
partition:
  strategy: specialist
