# Patch 7 — adaptive μ heuristic.
# Start μ=0 (so initially equivalent to FedAvg).
# After each round: if val loss increased → μ += 0.1
#                   if 5 consecutive decreases → μ -= 0.1 (floor at 0)
client_objective:
  proximal_mu: 0.0   # static fallback; server overrides per-round when adaptive_mu.enabled
  adaptive_mu:
    enabled: true
    init: 0.0
    step: 0.1
    min: 0.0
    max: 2.0
federation:
  local_epochs: 20
  num_rounds: 150
  track_grad_variance: true
