# Thesis FedProx-favorable base config.
#
# Stresses the exact failure mode FedProx was designed for:
#   - High local epochs (per-experiment override)
#   - Strongly non-IID heterogeneity (3 hospitals + 4 specialists + 3 mixed)
#   - Partial client participation (5/10 clients per round)
#   - Larger CNN to avoid underfitting hiding algorithm differences
#
# Per spec: macro-F1 is the primary metric (NOT accuracy).
# Per-class metrics also logged for the per-class plot.
#
# Headline test point: E=20 with 10 paired seeds.

dataset:
  name: dermamnist
  size: 64
  source: npz
  npz_path: ../dermamnist_64.npz

model:
  name: big_cnn
  in_channels: 3
  num_classes: 7
  pretrained: false

federation:
  num_clients: 10
  num_rounds: 150
  local_epochs: 20    # E — primary lever; overridden per-experiment
  fraction_fit: 0.5   # 5/10 clients per round (partial participation)
  fraction_evaluate: 1.0
  track_local_drift: true   # Records per-client val loss / macro-F1 each round

training:
  lr: 0.02
  momentum: 0.9
  batch_size: 32
  weight_decay: 0.0

loss:
  type: ce         # NO class-weighted CE in the headline (avoids confounding)
  focal_gamma: 2.0
  weight_strategy: none

augmentation:
  use_weighted_sampler: false

client_objective:
  proximal_mu: 0.0   # 0 = FedAvg; thesis_fedprox_*.yaml overrides this

partition:
  strategy: mixed_type
  specialist_dominance: 0.70
  hospital_common_share: 0.90
  min_samples_per_client: 10

misc:
  seed: 42
  device: cuda
  save_dir: results/thesis
