# System heterogeneity — FedAvg side.
#
# Inspired by the FedProx paper (Li et al. 2020) Fig. 4 and the
# nedeljkovicmajaa/Federated-Learning-And-Class-Imbalances repo (system_het/).
#
# Each round, EACH client is independently assigned a local-epoch count
# sampled uniformly from `system_heterogeneity`. This simulates real-world
# stragglers (low local work) and over-trainers (high local work) in the
# same federated round — exactly the scenario the proximal term is
# designed to handle.
#
# Otherwise: Dirichlet α=0.3 (the regime where vanilla FedProx already
# shows the largest mean improvement), full participation.
federation:
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  # IMPORTANT: when system_heterogeneity is set, this default is ignored;
  # the strategy overrides local_epochs per-client per-round.
  local_epochs: 5
  system_heterogeneity: [1, 2, 5, 10, 20]
partition:
  strategy: dirichlet
  alpha: 0.3
