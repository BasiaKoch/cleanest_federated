# FedProx "best case" comparison — FedAvg side.
# Maximises drift to test whether FedProx's proximal term provides
# a measurable stability/accuracy advantage.
#   Heterogeneity:    Dirichlet α = 0.1   (severe label skew)
#   Local epochs:     20                  (high — amplifies client drift)
#   fraction_fit:     0.5                 (partial participation — half clients per round)
#   Rounds:           100
federation:
  local_epochs: 20
  fraction_fit: 0.5
partition:
  strategy: dirichlet
  alpha: 0.1
