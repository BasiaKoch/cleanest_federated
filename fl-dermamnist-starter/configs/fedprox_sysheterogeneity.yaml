# System heterogeneity — FedProx side (same setup as fedavg_sysheterogeneity
# but with the proximal term activated).
client_objective:
  proximal_mu: 0.01
federation:
  fraction_fit: 1.0
  fraction_evaluate: 1.0
  local_epochs: 5
  system_heterogeneity: [1, 2, 5, 10, 20]
partition:
  strategy: dirichlet
  alpha: 0.3
